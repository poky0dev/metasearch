<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokye (Search)</title>
    <meta name="description" content="Pesquise qualquer coisa com 100% de privacidade online" />
    <meta name="theme-color" content="#0c0c12" />
    <meta name="robots" content="index,follow" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://search.pokye.workers.dev/" />
    <meta property="og:title" content="Pokye (Search)" />
    <meta property="og:description" content="Pesquise qualquer coisa com 100% de privacidade online" />
    <link rel="icon" href="https://search.pokye.workers.dev/assets/Logo.png" type="image/png" />
    <link title="Pokye Search" href="/opensearch.xml" rel="search" type="application/opensearchdescription+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Sora:wght@700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0; padding: 0; min-width: 0;
      }

      :root {
        --bg: #0c0c12;
        --surface: #141420;
        --elevated: #1b1b2a;
        --border: rgba(255,255,255,0.06);
        --border-focus: rgba(108,99,255,0.45);
        --text: #e2e2ec;
        --text-muted: rgba(226,226,236,0.38);
        --text-subtle: rgba(226,226,236,0.18);
        --accent: #6c63ff;
        --accent-glow: rgba(108,99,255,0.1);
        color-scheme: dark;
        font-family: 'DM Sans', system-ui, sans-serif;
      }

      html {
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text);
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed; inset: 0;
        background: radial-gradient(ellipse 65% 40% at 50% 28%, rgba(108,99,255,0.04) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* ─── Main ─── */
      main {
        position: relative; z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 2rem 1.25rem 5rem;
        gap: 1.75rem;
        animation: up 0.4s cubic-bezier(0.16,1,0.3,1) both;
      }

      @keyframes up {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─── Logo ─── */
      .logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
      }

      .logo-img {
        width: 50px; height: 50px;
        object-fit: contain;
        border-radius: 12px;
        filter: drop-shadow(0 0 14px rgba(108,99,255,0.28));
        transition: filter 0.3s, transform 0.3s;
      }
      .logo-img:hover {
        filter: drop-shadow(0 0 22px rgba(108,99,255,0.48));
        transform: scale(1.05);
      }

      .logo-name {
        font-family: 'Sora', sans-serif;
        font-size: 1.85rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        color: #fff;
        line-height: 1;
      }

      /* ─── Search ─── */
      .search-wrap {
        width: 100%;
        max-width: 530px;
        position: relative;
      }

      .search-bar {
        display: flex;
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 11px;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      .search-bar:has(input:focus) {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 28px rgba(0,0,0,0.3);
        background: var(--elevated);
      }

      .search-ico {
        flex-shrink: 0; width: 40px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-subtle);
        pointer-events: none;
        transition: color 0.2s;
      }
      .search-bar:has(input:focus) .search-ico { color: var(--accent); }
      .search-ico svg { width: 15px; height: 15px; }

      .search-input {
        flex: 1;
        background: transparent;
        border: none; outline: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.925rem;
        font-weight: 400;
        color: var(--text);
        padding: 0.82rem 0.5rem 0.82rem 0;
        caret-color: var(--accent);
      }
      .search-input::placeholder { color: var(--text-subtle); font-weight: 300; }

      .clear-btn {
        flex-shrink: 0;
        width: 34px; height: 34px;
        margin-right: 3px;
        display: none; align-items: center; justify-content: center;
        background: none; border: none; border-radius: 7px;
        color: var(--text-muted); cursor: pointer;
        transition: color 0.15s, background 0.15s;
      }
      .clear-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
      .clear-btn svg { width: 13px; height: 13px; }
      .clear-btn.visible { display: flex; }

      /* ─── Suggestions ─── */
      .suggestions {
        position: absolute;
        top: calc(100% + 5px);
        left: 0; right: 0;
        background: var(--elevated);
        border: 1px solid var(--border);
        border-radius: 11px;
        overflow: hidden;
        box-shadow: 0 12px 36px rgba(0,0,0,0.5);
        z-index: 100;
        display: none;
      }
      .suggestions.open { display: block; }

      .sug-item {
        display: flex; align-items: center; gap: 0.6rem;
        padding: 0.6rem 0.85rem;
        font-size: 0.875rem;
        color: var(--text);
        cursor: pointer;
        transition: background 0.1s;
        user-select: none;
      }
      .sug-item:hover, .sug-item.active { background: rgba(108,99,255,0.09); }
      .sug-item svg { width: 13px; height: 13px; color: var(--text-subtle); flex-shrink: 0; }

      /* ─── Footer ─── */
      footer {
        position: relative; z-index: 1;
        width: 100%;
        padding: 0.9rem 1.5rem;
        border-top: 1px solid var(--border);
        animation: up 0.4s 0.12s cubic-bezier(0.16,1,0.3,1) both;
      }

      .footer-inner {
        max-width: 1136px; margin: 0 auto;
        display: flex; align-items: center; justify-content: space-between;
        gap: 1rem; flex-wrap: wrap;
      }

      .footer-copy {
        font-size: 0.72rem;
        color: var(--text-subtle);
        letter-spacing: 0.01em;
      }

      .footer-links {
        display: flex; align-items: center; gap: 1rem;
      }
      .footer-links a {
        font-size: 0.72rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.15s;
      }
      .footer-links a:hover { color: var(--text); }

      @media (max-width: 460px) {
        .logo-name { font-size: 1.5rem; }
        .footer-inner { flex-direction: column; align-items: center; gap: 0.4rem; }
      }
    </style>
  </head>

  <body>
    <main>
      <div class="logo">
        <img
          src="https://search.pokye.workers.dev/assets/v2.logo.png"
          alt="Pokye" class="logo-img" width="50" height="50"
        />
        <div class="logo-name">Pokye</div>
      </div>

      <div class="search-wrap">
        <form id="searchForm" action="/" method="GET" autocomplete="off">
          <div class="search-bar">
            <div class="search-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </div>

            <input
              id="searchInput"
              class="search-input"
              name="q"
              type="text"
              placeholder="Pesquise algo :3"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              autofocus
              aria-label="Campo de pesquisa"
              aria-autocomplete="list"
              aria-controls="suggestions"
            />

            <button type="button" class="clear-btn" id="clearBtn" aria-label="Limpar" tabindex="-1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </form>

        <div class="suggestions" id="suggestions" role="listbox" aria-label="Sugestões"></div>
      </div>
    </main>

    <footer>
      <div class="footer-inner">
        <span class="footer-copy">Copyright &copy; 2026 Pokye</span>
        <nav class="footer-links" aria-label="Links do rodapé">
          <a href="/terms">Termos de Serviço</a>
          <a href="/privacy">Política de Privacidade</a>
          <a href="/about">Sobre</a>
        </nav>
      </div>
    </footer>

    <script>
      const input      = document.getElementById('searchInput');
      const suggestBox = document.getElementById('suggestions');
      const clearBtn   = document.getElementById('clearBtn');
      const form       = document.getElementById('searchForm');

      const PROXY = 'https://corsproxy.io/?url=';
      const suggestURL = (q) =>
        PROXY + encodeURIComponent('https://suggestqueries.google.com/complete/search?client=firefox&q=' + encodeURIComponent(q));

      let activeIdx = -1;
      let items = [];
      let timer = null;

      async function fetchSuggestions(q) {
        if (!q.trim()) { close_(); return; }
        try {
          const res  = await fetch(suggestURL(q));
          const data = await res.json();
          render(data[1] || []);
        } catch { close_(); }
      }

      function render(list) {
        items = list;
        activeIdx = -1;
        if (!list.length) { close_(); return; }

        suggestBox.innerHTML = list.map((s, i) => `
          <div class="sug-item" role="option" data-i="${i}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            ${esc(s)}
          </div>`).join('');
        suggestBox.classList.add('open');

        suggestBox.querySelectorAll('.sug-item').forEach(el => {
          el.addEventListener('mousedown', e => { e.preventDefault(); go(items[+el.dataset.i]); });
        });
      }

      function close_() {
        suggestBox.classList.remove('open');
        suggestBox.innerHTML = '';
        activeIdx = -1; items = [];
      }

      function go(q) {
        const term = (q || input.value).trim();
        if (!term) return;
        close_();
        window.location.href = '?q=' + encodeURIComponent(term);
      }

      function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      input.addEventListener('input', () => {
        const v = input.value;
        document.title = v.trim() ? v.trim() + ' – Pokye' : 'Pokye (Search)';
        clearBtn.classList.toggle('visible', v.length > 0);
        clearTimeout(timer);
        timer = setTimeout(() => fetchSuggestions(v), 160);
      });

      input.addEventListener('keydown', e => {
        const els = suggestBox.querySelectorAll('.sug-item');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIdx = Math.min(activeIdx + 1, els.length - 1);
          update(els);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, -1);
          update(els);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          go(activeIdx >= 0 ? items[activeIdx] : null);
        } else if (e.key === 'Escape') {
          close_();
        }
      });

      function update(els) {
        els.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        if (activeIdx >= 0 && items[activeIdx]) input.value = items[activeIdx];
      }

      document.addEventListener('click', e => {
        if (!e.target.closest('.search-wrap')) close_();
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.remove('visible');
        document.title = 'Pokye (Search)';
        close_();
        input.focus();
      });

      form.addEventListener('submit', e => { e.preventDefault(); go(); });

      document.addEventListener('keydown', e => {
        if (e.key === '/' && document.activeElement !== input) {
          e.preventDefault(); input.focus();
        }
      });
    </script>
  </body>
</html>
