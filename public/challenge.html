<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>checking your browser… / search.tiago.zip</title>
    <meta name="theme-color" content="#1f1e2e" />
    <style>
      * {
        box-sizing: border-box;
        min-width: 0;
        text-underline-offset: 3px;
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
      }

      :root {
        color-scheme: dark;
        interpolate-size: allow-keywords;
        font-family:
          InterVar,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;

        --sh-class: #b4befe;
        --sh-identifier: #a6e3a1;
        --sh-sign: #cdd6f4;
        --sh-property: #94e2d5;
        --sh-entity: #89dceb;
        --sh-jsxliterals: #fab387;
        --sh-string: #f9e2af;
        --sh-keyword: #89b4fa;
        --sh-comment: #6c7086;
        --text: #cdd6f4;
        --bg: #1f1e2e;
        --surface0: #313244;
        --surface1: #45475a;
        --subtext: #a6adc8;
        --blue: #89b4fa;
        --muted: #7f849c;
      }

      html {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        text-size-adjust: 100%;
        scrollbar-width: thin;
        scrollbar-color: hsla(255 0 255 / 15%) var(--bg);
        background-color: var(--bg);
        scrollbar-gutter: stable;
        overflow-x: hidden;
      }

      body {
        display: flex;
        width: 100%;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        flex-direction: column;
        overflow-x: hidden;
      }

      .body {
        margin: 0 auto;
        display: flex;
        width: 100%;
        padding-left: 18px;
        padding-right: 18px;
        gap: 58px;
        min-height: calc(100vh - 20vh);

        @media (max-width: 800px) {
          padding-left: 12px;
          padding-right: 12px;
          gap: 32px;
        }
      }

      main {
        width: 100%;
        color: var(--text);
        line-height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;

        h1 {
          font-weight: 400;
          font-size: 21px;
          margin-bottom: 0px;
        }

        p {
          text-align: center;
          font-size: 16px;
          max-width: 326px;
          line-height: 1.5;
          margin-top: 4px;
          color: #9aa2be;
        }
      }

      #progress {
        width: min(20rem, 90%);
        height: 2em;
        border-radius: 1rem;
        overflow: hidden;
        margin: 1rem 0 2rem;
        outline-offset: 2px;
        outline: #89b4fa solid 2px;
        margin-top: 2em;

        #bar {
          width: 1%;
          height: 100%;
          background: #89b4fa;
          transition: width 0.15s;
        }
      }

      .pb {
        margin-top: -2px;
        color: #9aa2be;
        text-decoration: none;
        opacity: 0.8;
        font-size: 14px;
        position: absolute;
        bottom: 10px;
      }

      .error {
        color: #f38ba8;
        margin-top: 1rem;
        font-size: 14px;
      }

      @font-face {
        font-family: "InterVar";
        font-display: swap;
        src: url("/s/inter-var-v4.woff2");
      }
    </style>
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="x-ua-compatible" content="IE=edge,chrome=1" />
    <meta name="robots" content="noindex,nofollow" />
    <link
      rel="preload"
      href="/s/inter-var-v4.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div class="body">
      <main>
        <h1>making sure you're not a bot!</h1>
        <p>
          you won't see this again until after 100 searches or 2 days, whichever
          comes first.
        </p>
        <div id="progress">
          <div id="bar"></div>
        </div>
        <div id="error" class="error" style="display: none"></div>

        <a href="https://capjs.js.org" class="pb">powered by cap</a>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
    <script type="module">
      const progressBar = document.getElementById("bar");
      const errorEl = document.getElementById("error");

      const workerCode = `
        self.onmessage = async (e) => {
          importScripts('https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js');

          const { seed, jobIndex } = e.data;
          const encoder = new TextEncoder();

          const saltInput = encoder.encode(\`%%seed%%:\${jobIndex}\`);
          const saltHashBuf = await crypto.subtle.digest("SHA-256", saltInput);
          const salt = new Uint8Array(saltHashBuf).slice(0, 16);

          let attempts = 0;

          while (true) {
            const input = \`%%seed%%:\${jobIndex}:\${attempts}\`;

            try {
              const result = await argon2.hash({
                pass: encoder.encode(input),
                salt: salt,
                type: argon2.ArgonType.Argon2d,
                mem: __mem__,
                time: __time__,
                parallelism: 1,
                hashLen: __hashLen__
              });

              const hashHex = Array.from(new Uint8Array(result.hash))
                .map(b => b.toString(16).padStart(2, "0"))
                .join("");

              if (hashHex.startsWith("%%prefix%%")) {
                self.postMessage({
                  found: true,
                  jobIndex: jobIndex,
                  nonce: attempts,
                  attempts: attempts + 1
                });
                return;
              }

              attempts++;
            } catch (error) {
              self.postMessage({ found: false, error: error.message });
              return;
            }
          }
        };
      `;

      const workerBlob = new Blob([workerCode], {
        type: "application/javascript",
      });
      const workerUrl = URL.createObjectURL(workerBlob);

      let completed = 0;
      const solutions = [];

      const runJob = (jobIndex) =>
        new Promise((resolve) => {
          const worker = new Worker(workerUrl);
          worker.postMessage({
            jobIndex: jobIndex,
          });

          worker.onmessage = (e) => {
            worker.terminate();

            if (e.data.error) {
              errorEl.textContent = e.data.error;
              errorEl.style.display = "block";
              document.querySelector("#bar").style.backgroundColor = "#f38ba8";
              document.querySelector("#progress").style.outlineColor =
                "#f38ba8";
              resolve({ error: e.data.error });
              return;
            }

            if (e.data.found) {
              completed++;
              progressBar.style.width = `${(completed / __jobs__) * 100}%`;
              solutions.push({
                jobIndex: e.data.jobIndex,
                nonce: e.data.nonce,
                attempts: e.data.attempts,
              });
              resolve(e.data);
            }
          };

          worker.onerror = (err) => {
            worker.terminate();
            errorEl.textContent = err.message;
            errorEl.style.display = "block";
            document.querySelector("#bar").style.backgroundColor = "#f38ba8";
            document.querySelector("#progress").style.outlineColor = "#f38ba8";
            resolve({ error: err.message });
          };
        });

      try {
        const concurrency = navigator.hardwareConcurrency || 4;
        const queue = Array.from(
          { length: __jobs__ },
          (_, i) => () => runJob(i),
        );

        for (let i = 0; i < queue.length; i += concurrency) {
          const batch = queue.slice(i, i + concurrency).map((fn) => fn());
          const results = await Promise.all(batch);

          if (results.some((r) => r.error)) {
            throw new Error(results.find((r) => r.error).error);
          }
        }

        solutions.sort((a, b) => a.jobIndex - b.jobIndex);

        const orderedSolutions = solutions.map(({ nonce, attempts }) => ({
          nonce,
          attempts,
        }));

        const response = await fetch("/challenge", {
          method: "POST",
          headers: {
            "X-Galileo-Csrf": "1",
            "Content-Type": "application/json",
          },
          body: JSON.stringify(["%%seedId%%", orderedSolutions]),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "verification failed");
        }

        if (data.t) {
          localStorage.setItem("galileo_pass", data.t);
        }

        window.location.href = `%%redirect%%`;
      } catch (err) {
        errorEl.textContent = err.message || "something went wrong";
        errorEl.style.display = "block";
        document.querySelector("#bar").style.backgroundColor = "#f38ba8";
        document.querySelector("#progress").style.outlineColor = "#f38ba8";
      }
    </script>
  </body>
</html>
