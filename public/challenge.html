<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>checking your browser… / search.tiago.zip</title>
    <meta name="theme-color" content="#1f1e2e" />
    <style>
      * {
        box-sizing: border-box;
        min-width: 0;
        text-underline-offset: 3px;
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
      }

      :root {
        color-scheme: dark;
        interpolate-size: allow-keywords;
        font-family:
          InterVar,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;

        --text: #cdd6f4;
        --bg: #1f1e2e;
        --surface0: #313244;
        --surface1: #45475a;
        --subtext: #a6adc8;
        --blue: #89b4fa;
        --muted: #7f849c;
      }

      html {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        text-size-adjust: 100%;
        scrollbar-width: thin;
        scrollbar-color: hsla(255 0 255 / 15%) var(--bg);
        background-color: var(--bg);
        scrollbar-gutter: stable;
        overflow-x: hidden;
      }

      body {
        display: flex;
        width: 100%;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        flex-direction: column;
        overflow-x: hidden;
      }

      .body {
        margin: 0 auto;
        display: flex;
        width: 100%;
        padding-left: 18px;
        padding-right: 18px;
        gap: 58px;
        min-height: calc(100vh - 20vh);

        @media (max-width: 800px) {
          padding-left: 12px;
          padding-right: 12px;
          gap: 32px;
        }
      }

      main {
        width: 100%;
        color: var(--text);
        line-height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;

        h1 {
          font-weight: 400;
          font-size: 21px;
          margin-bottom: 0px;
        }

        p {
          text-align: center;
          font-size: 16px;
          max-width: 326px;
          line-height: 1.5;
          margin-bottom: 0px;
          margin-top: 4px;
          color: #9aa2be;
        }
      }

      .cap-container {
        margin-top: 1.5em;
      }

      cap-widget {
        --cap-background: var(--surface0);
        --cap-border-color: var(--surface1);
        --cap-border-radius: 14px;
        --cap-color: var(--text);
        --cap-checkbox-border: 1px solid var(--muted);
        --cap-checkbox-border-radius: 6px;
        --cap-checkbox-background: var(--bg);
        --cap-spinner-color: var(--blue);
        --cap-spinner-background-color: var(--surface1);
        --cap-font:
          InterVar, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      .pb {
        margin-top: 24px;
        color: #9aa2be;
        text-decoration: none;
        opacity: 0.8;
        font-size: 14px;
        position: absolute;
        bottom: 10px;
      }

      .error {
        color: #f38ba8;
        margin-top: 1rem;
        font-size: 14px;
      }

      @font-face {
        font-family: "InterVar";
        font-display: swap;
        src: url("/s/inter-var-v4.woff2");
      }
    </style>
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="x-ua-compatible" content="IE=edge,chrome=1" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preload" href="/s/inter-var-v4.woff2" as="font" type="font/woff2" />
  </head>
  <body>
    <div class="body">
      <main>
        <h1>making sure you're not a bot!</h1>
        <p>you won't see this again until after 100 searches or 2 days, whichever comes first.</p>

        <div class="cap-container">
          <cap-widget
            id="cap"
            data-cap-api-endpoint="/c/cap/"
            data-cap-i18n-initial-state="I'm a human"
            data-cap-i18n-verifying-label="Verifying..."
            data-cap-i18n-solved-label="Verified!"
            data-cap-i18n-error-label="Error — click to retry"
          ></cap-widget>
        </div>

        <div id="error" class="error" style="display: none"></div>

        <a href="https://capjs.js.org" class="pb">powered by cap</a>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@cap.js/widget@0.1.34"
      onload="document.querySelector('#cap').solve()"
    ></script>

    <script type="module">
      const widget = document.querySelector("#cap");
      const errorEl = document.querySelector("#error");

      const cookiesEnabled = () => {
        try {
          document.cookie = "test=1; path=/";
          const supported = document.cookie.indexOf("test=") !== -1;
          document.cookie = "test=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";
          return supported;
        } catch {
          return false;
        }
      };

      widget.addEventListener("solve", async (e) => {
        const capToken = e.detail.token;

        try {
          const response = await fetch(window.location.pathname, {
            method: "POST",
            headers: {
              "X-Galileo-Csrf": "1",
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              capToken,
              doCookie: cookiesEnabled(),
            }),
          });

          const data = await response.json();
          if (!response.ok || data?.error) {
            throw new Error(data?.error || "Verification failed");
          }

          const url = new URL("%%redirect%%", window.location.origin);
          if (data.pass) {
            url.searchParams.set("pass", data.pass);
          }

          window.location.href = url.href;
        } catch (err) {
          errorEl.textContent = err.message || "something went wrong";
          errorEl.style.display = "block";
        }
      });

      widget.addEventListener("error", (e) => {
        errorEl.textContent = e.detail?.message || e.message || e || "something went wrong";
        errorEl.style.display = "block";
      });
    </script>
  </body>
  <script defer data-domain="metasearch.tiago.zip" src="https://a.tiago.zip/js/script.js"></script>
</html>
